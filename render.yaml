services:
  - type: web
    name: newrelic-unified-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn run:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: mphasis-postgres
          property: connectionString
      - key: NEW_RELIC_API_KEY
        sync: false
      - key: NEW_RELIC_ACCOUNT_ID
        sync: false

  - type: psql
    name: mphasis-postgres
    plan: free
